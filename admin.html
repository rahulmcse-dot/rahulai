<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin - Tech Hub</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Shared Header -->
    <div id="header-placeholder"></div>

    <main class="container">

        <h2>Admin Panel</h2>

        <button id="showAddFormBtn">
            Add New
        </button>

        <div id="addForm" style="display:none; margin-top:20px;">

            <input
                type="text"
                id="newTitle"
                placeholder="Title"
            >

            <br><br>

            <textarea
                id="newDesc"
                placeholder="Description"
            ></textarea>

            <br><br>

            <input
                type="text"
                id="newTech"
                placeholder="Tech"
            >

            <br><br>

            <input
                type="text"
                id="newLink"
                placeholder="Link"
            >

            <br><br>

            <button id="saveNewBtn">
                Save
            </button>

        </div>

        <hr>

        <div id="courseList"></div>

    </main>

    <!-- Shared Footer -->
    <div id="footer-placeholder"></div>

    <!-- Config Files -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/firebase.js"></script>
    <script src="js/supabase.js"></script>

    <script type="module">

        import {
            onAuthStateChanged
        }
        from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

        const ADMIN_EMAIL =
            "rahulmcse@gmail.com";

        async function loadSharedFiles() {

            const header =
                await fetch("header.html");

            document
                .getElementById(
                    "header-placeholder"
                )
                .innerHTML =
                await header.text();

            const footer =
                await fetch("footer.html");

            document
                .getElementById(
                    "footer-placeholder"
                )
                .innerHTML =
                await footer.text();

        }

        loadSharedFiles();

        const waitForFirebase =
            setInterval(() => {

                if (
                    window.firebaseAuth &&
                    window.supabaseClient
                ) {

                    clearInterval(
                        waitForFirebase
                    );

                    initializeAdmin();

                }

            }, 200);

        function initializeAdmin() {

            onAuthStateChanged(
                window.firebaseAuth,
                async (user) => {

                    if (!user) {

                        window.location.href =
                            "index.html";

                        return;

                    }

                    if (
                        user.email !==
                        ADMIN_EMAIL
                    ) {

                        window.location.href =
                            "index.html";

                        return;

                    }

                    loadCourses();

                }
            );

        }

        document
            .getElementById(
                "showAddFormBtn"
            )
            .addEventListener(
                "click",
                () => {

                    document
                        .getElementById(
                            "addForm"
                        )
                        .style.display =
                        "block";

                }
            );

        document
            .getElementById(
                "saveNewBtn"
            )
            .addEventListener(
                "click",
                addCourse
            );

        async function addCourse() {

            const title =
                document.getElementById(
                    "newTitle"
                ).value;

            const desc =
                document.getElementById(
                    "newDesc"
                ).value;

            const tech =
                document.getElementById(
                    "newTech"
                ).value;

            const link =
                document.getElementById(
                    "newLink"
                ).value;

            if (!title) {

                alert(
                    "Title is required"
                );

                return;

            }

            const { error } =
                await window.supabaseClient
                    .from("trainingdata")
                    .insert([
                        {
                            title,
                            desc,
                            tech,
                            link
                        }
                    ]);

            if (error) {

                console.error(error);

                return;

            }

            loadCourses();

            document
                .getElementById(
                    "addForm"
                )
                .reset?.();

            location.reload();

        }

        async function loadCourses() {

            const {
                data,
                error
            } =
            await window.supabaseClient
                .from("trainingdata")
                .select("*")
                .order("id");

            if (error) {

                console.error(error);

                return;

            }

            const container =
                document.getElementById(
                    "courseList"
                );

            container.innerHTML = "";

            data.forEach(course => {

                const div =
                    document.createElement(
                        "div"
                    );

                div.innerHTML = `

                    <hr>

                    <input
                        id="title-${course.id}"
                        value="${course.title || ""}"
                    >

                    <br><br>

                    <textarea
                        id="desc-${course.id}"
                    >${course.desc || ""}</textarea>

                    <br><br>

                    <input
                        id="tech-${course.id}"
                        value="${course.tech || ""}"
                    >

                    <br><br>

                    <input
                        id="link-${course.id}"
                        value="${course.link || ""}"
                    >

                    <br><br>

                    <button
                        onclick="saveCourse(${course.id})"
                    >
                        Save
                    </button>

                    <button
                        onclick="deleteCourse(${course.id})"
                    >
                        Delete
                    </button>

                `;

                container.appendChild(div);

            });

        }

        window.saveCourse =
            async function(id) {

                const title =
                    document.getElementById(
                        `title-${id}`
                    ).value;

                const desc =
                    document.getElementById(
                        `desc-${id}`
                    ).value;

                const tech =
                    document.getElementById(
                        `tech-${id}`
                    ).value;

                const link =
                    document.getElementById(
                        `link-${id}`
                    ).value;

                const { error } =
                    await window.supabaseClient
                        .from("trainingdata")
                        .update({
                            title,
                            desc,
                            tech,
                            link
                        })
                        .eq("id", id);

                if (error) {

                    console.error(error);

                    return;

                }

                alert("Updated");

            };

        window.deleteCourse =
            async function(id) {

                const { error } =
                    await window.supabaseClient
                        .from("trainingdata")
                        .delete()
                        .eq("id", id);

                if (error) {

                    console.error(error);

                    return;

                }

                loadCourses();

            };

    </script>

</body>
</html>
