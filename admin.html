```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header>

    <div class="navbar">

        <div class="logo">
            Tech Hub
        </div>

        <div class="nav-links">

            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>

            <a href="admin.html"
               id="adminLink">
                Admin
            </a>

        </div>

        <div id="auth-area"></div>

    </div>

</header>

<main class="container">

    <h1>Admin Dashboard</h1>

    <div id="adminStatus">

        Checking access...

    </div>

    <br>

    <button id="addCourseBtn">

        Add New Course

    </button>

    <br><br>

    <div id="courseForm"
         style="display:none;">

        <input
            type="text"
            id="title"
            placeholder="Title"
        >

        <br><br>

        <textarea
            id="desc"
            placeholder="Description"
        ></textarea>

        <br><br>

        <input
            type="text"
            id="tech"
            placeholder="Technology"
        >

        <br><br>

        <input
            type="text"
            id="link"
            placeholder="Course Link"
        >

        <br><br>

        <button id="saveCourseBtn">
            Save Course
        </button>

        <hr>

    </div>

    <div id="courseList">

        Loading courses...

    </div>

</main>

<footer>

Built with GitHub Pages,
Firebase Authentication
and Supabase

</footer>

<script type="module"
        src="js/config.js"></script>

<script type="module"
        src="js/auth.js"></script>

<script type="module">

import {
    onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

const ADMIN_EMAIL =
    "rahulmcse@gmail.com";

const waitForFirebase =
setInterval(() => {

    if (
        window.firebaseAuth &&
        window.supabaseClient
    ) {

        clearInterval(
            waitForFirebase
        );

        initializeAdmin();

    }

}, 200);

function initializeAdmin() {

    onAuthStateChanged(
        window.firebaseAuth,
        (user) => {

            if (!user) {

                window.location.href =
                    "index.html";

                return;

            }

            if (
                user.email !==
                ADMIN_EMAIL
            ) {

                window.location.href =
                    "index.html";

                return;

            }

            document.getElementById(
                "adminStatus"
            ).innerHTML =

            `
            <h2>Welcome Admin</h2>
            <p>${user.displayName}</p>
            `;

            loadCourses();

        }
    );
}

document
.getElementById("addCourseBtn")
.addEventListener(
    "click",
    () => {

        document
        .getElementById(
            "courseForm"
        )
        .style.display =
        "block";

    }
);

document
.getElementById("saveCourseBtn")
.addEventListener(
    "click",
    addCourse
);

async function addCourse() {

    const title =
        document.getElementById(
            "title"
        ).value;

    const desc =
        document.getElementById(
            "desc"
        ).value;

    const tech =
        document.getElementById(
            "tech"
        ).value;

    const link =
        document.getElementById(
            "link"
        ).value;

    if (!title) {

        alert(
            "Title is required"
        );

        return;

    }

    const { error } =
    await window.supabaseClient
        .from("trainingdata")
        .insert([
            {
                title,
                desc,
                tech,
                link
            }
        ]);

    if (error) {

        console.error(error);

        return;

    }

    loadCourses();

}

async function loadCourses() {

    const {
        data,
        error
    } =
    await window.supabaseClient
        .from("trainingdata")
        .select("*")
        .order(
            "id",
            {
                ascending:false
            }
        );

    if (error) {

        console.error(error);

        return;

    }

    const courseList =
        document.getElementById(
            "courseList"
        );

    courseList.innerHTML = "";

    data.forEach(course => {

        courseList.innerHTML += `

        <div class="card">

            <input
                id="title-${course.id}"
                value="${course.title || ""}"
            >

            <br><br>

            <textarea
                id="desc-${course.id}"
            >${course.desc || ""}</textarea>

            <br><br>

            <input
                id="tech-${course.id}"
                value="${course.tech || ""}"
            >

            <br><br>

            <input
                id="link-${course.id}"
                value="${course.link || ""}"
            >

            <br><br>

            <button
                onclick="saveCourse(${course.id})"
            >
                Save
            </button>

            <button
                onclick="deleteCourse(${course.id})"
            >
                Delete
            </button>

        </div>

        <br>

        `;
    });

}

window.saveCourse =
async function(id) {

    const title =
        document.getElementById(
            `title-${id}`
        ).value;

    const desc =
        document.getElementById(
            `desc-${id}`
        ).value;

    const tech =
        document.getElementById(
            `tech-${id}`
        ).value;

    const link =
        document.getElementById(
            `link-${id}`
        ).value;

    const { error } =
    await window.supabaseClient
        .from("trainingdata")
        .update({
            title,
            desc,
            tech,
            link
        })
        .eq("id", id);

    if (error) {

        console.error(error);

        return;

    }

    alert("Updated");

};

window.deleteCourse =
async function(id) {

    const { error } =
    await window.supabaseClient
        .from("trainingdata")
        .delete()
        .eq("id", id);

    if (error) {

        console.error(error);

        return;

    }

    loadCourses();

};

</script>

</body>
</html>
