<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="navbar">

            <div class="logo">
                Tech Hub
            </div>

            <div class="nav-links">

                <a href="index.html">Home</a>

                <a href="about.html">About</a>

                <a href="contact.html">Contact</a>

                <a href="admin.html"
                   id="adminLink">
                    Admin
                </a>

            </div>

            <div id="auth-area"></div>

        </div>

    </header>

    <!-- MAIN -->

    <main class="container">

        <h1>
            Admin Dashboard
        </h1>

        <div id="adminStatus">

            Checking access...

        </div>

        <br>

        <button id="addCourseBtn">

            Add New Course

        </button>

        <hr>

        <div id="courseList">

            Loading courses...

        </div>

    </main>

    <!-- FOOTER -->

    <footer>

        Built with GitHub Pages,
        Firebase Authentication
        and Supabase

    </footer>

    <!-- CONFIG -->

    <script type="module"
            src="js/config.js"></script>

    <script type="module"
            src="js/auth.js"></script>

    <!-- ADMIN LOGIC -->

    <script type="module">

        import {
            onAuthStateChanged
        }
        from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

        const ADMIN_EMAIL =
            "rahulmcse@gmail.com";

        const waitForFirebase =
            setInterval(() => {

                if (
                    window.firebaseAuth &&
                    window.supabaseClient
                ) {

                    clearInterval(
                        waitForFirebase
                    );

                    checkAdmin();

                }

            }, 200);

        function checkAdmin() {

            onAuthStateChanged(
                window.firebaseAuth,
                (user) => {

                    if (!user) {

                        window.location.href =
                            "index.html";

                        return;

                    }

                    if (
                        user.email !==
                        ADMIN_EMAIL
                    ) {

                        window.location.href =
                            "index.html";

                        return;

                    }

                    document.getElementById(
                        "adminStatus"
                    ).innerHTML =

                    `
                    <h2>
                        Welcome Admin
                    </h2>

                    <p>
                        ${user.displayName}
                    </p>
                    `;

                    loadCourses();

                }
            );

        }

        async function loadCourses() {

            const courseList =
                document.getElementById(
                    "courseList"
                );

            courseList.innerHTML =
                "Loading courses...";

            const {
                data,
                error
            } =
            await window.supabaseClient
                .from("trainingdata")
                .select("*")
                .order("id", {
                    ascending: false
                });

            if (error) {

                console.error(error);

                courseList.innerHTML =
                    "Error loading courses";

                return;

            }

            if (
                !data ||
                data.length === 0
            ) {

                courseList.innerHTML =
                    "No courses found";

                return;

            }

            courseList.innerHTML = "";

            data.forEach(course => {

                courseList.innerHTML += `

                <div class="card">

                    <h3>
                        ${course.title || ""}
                    </h3>

                    <p>
                        ${course.desc || ""}
                    </p>

                    <div class="tag">
                        ${course.tech || ""}
                    </div>

                    <br><br>

                    <a
                        href="${course.link || "#"}"
                        target="_blank"
                    >
                        Open Link
                    </a>

                    <br><br>

                    <button>
                        Edit
                    </button>

                    <button>
                        Delete
                    </button>

                </div>

                <br>

                `;

            });

        }

    </script>

</body>

</html>
