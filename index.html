<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Training Data Manager</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        padding: 40px;
    }

    .box {
        width: 600px;
        background: rgba(255,255,255,0.08);
        padding: 20px;
        border-radius: 12px;
    }

    input, textarea {
        width: 100%;
        margin: 8px 0;
        padding: 10px;
        border-radius: 6px;
        border: none;
    }

    button {
        padding: 10px;
        width: 100%;
        background: #3b82f6;
        color: white;
        border: none;
        cursor: pointer;
        margin-top: 10px;
        border-radius: 6px;
    }

    .card {
        margin-top: 10px;
        padding: 10px;
        background: rgba(255,255,255,0.1);
        border-radius: 8px;
    }

    a { color: #60a5fa; }
</style>
</head>

<body>

<div class="box">
    <h2>Training Data Manager</h2>

    <input id="title" placeholder="Title"/>
    <textarea id="desc" placeholder="Description"></textarea>
    <input id="tech" placeholder="Technology"/>
    <input id="link" placeholder="Link"/>

    <button onclick="addData()">Add Data</button>

    <h3>Records</h3>
    <div id="output"></div>
</div>

<script>
/* =========================
   SUPABASE CONFIG
========================= */
const SUPABASE_URL = "https://ykcbdmdqzeonodemcavc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_yhzQvFqLaMw861azeWeBSQ_iDUy70Jg";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

/* =========================
   INSERT DATA
========================= */
async function addData() {

    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;
    const tech = document.getElementById("tech").value;
    const link = document.getElementById("link").value;

    const { error } = await supabaseClient
        .from("trainingdata")
        .insert([
            {
                title: title,
                desc: desc,
                tech: tech,
                link: link
            }
        ]);

    if (error) {
        alert("Insert Error: " + error.message);
        console.log(error);
        return;
    }

    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("tech").value = "";
    document.getElementById("link").value = "";

    loadData();
}

/* =========================
   FETCH DATA
========================= */
async function loadData() {

    const { data, error } = await supabaseClient
        .from("trainingdata")
        .select("*")
        .order("id", { ascending: false });

    if (error) {
        console.log("Fetch Error:", error);
        return;
    }

    let html = "";

    data.forEach(row => {
        html += `
            <div class="card">
                <h4>${row.title}</h4>
                <p>${row.desc || ""}</p>
                <p><b>Tech:</b> ${row.tech || ""}</p>
                ${row.link ? `<a href="${row.link}" target="_blank">Open Link</a>` : ""}
            </div>
        `;
    });

    document.getElementById("output").innerHTML = html;
}

loadData();
</script>

</body>
</html>
