<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to AI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #3b82f6);
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        p {
            color: rgba(255,255,255,0.85);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.4);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
        }

        .glow.one {
            top: -100px;
            left: -100px;
        }

        .glow.two {
            bottom: -100px;
            right: -100px;
            background: rgba(168, 85, 247, 0.4);
        }
    </style>
</head>
<body>

    <div class="glow one"></div>
    <div class="glow two"></div>

    <div class="container">
        <h1>Welcome to AI from Github Web</h1>
        <p>
            Explore the future of AI-powered development with a modern,
            responsive, and elegant web experience.
        </p>
    </div>

</body>
</html>
