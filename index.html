<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to AI</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #3b82f6);
            flex-direction: column;
            overflow: auto;
            padding: 40px;
        }

        .container {
            text-align: center;
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            width: 90%;
            max-width: 800px;
        }

        h1 {
            color: white;
            margin-bottom: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            margin-top: 10px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
            color: white;
            text-align: left;
        }

        a {
            color: #60a5fa;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Training Data Manager</h1>

    <input id="title" placeholder="Title">
    <textarea id="desc" placeholder="Description"></textarea>
    <input id="tech" placeholder="Technology">
    <input id="link" placeholder="Link">

    <button onclick="addData()">Add Data</button>

    <h2 style="color:white;margin-top:20px;">Records</h2>
    <div id="output"></div>
</div>

<script>
/* =========================
   SUPABASE CONNECTION
========================= */
const SUPABASE_URL = "https://ykcbdmdqzeonodemcavc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_yhzQvFqLaMw861azeWeBSQ_iDUy70Jg";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

/* =========================
   INSERT DATA
========================= */
async function addData() {

    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;
    const tech = document.getElementById("tech").value;
    const link = document.getElementById("link").value;

    const { error } = await supabaseClient
        .from("trainingdata")
        .insert([
            {
                title,
                desc,
                tech,
                link
            }
        ]);

    if (error) {
        alert(error.message);
        return;
    }

    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("tech").value = "";
    document.getElementById("link").value = "";

    loadData();
}

/* =========================
   FETCH DATA
========================= */
async function loadData() {

    const { data, error } = await supabaseClient
        .from("trainingdata")
        .select("*")
        .order("id", { ascending: false });

    if (error) {
        console.log(error);
        return;
    }

    let html = "";

    data.forEach(item => {
        html += `
            <div class="card">
                <h3>${item.title}</h3>
                <p>${item.desc || ""}</p>
                <p><b>Tech:</b> ${item.tech || ""}</p>
                ${item.link ? `<a href="${item.link}" target="_blank">Open Link</a>` : ""}
            </div>
        `;
    });

    document.getElementById("output").innerHTML = html;
}

loadData();
</script>

</body>
</html>
